<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }

        /* 聊天內容區 */
        #chat-container { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 20px; }
        .message { padding: 15px 20px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-wrap: break-word; }
        .user { align-self: flex-end; background-color: #2b5a91; color: white; border-bottom-right-radius: 2px; max-width: 80%; }
        .ai { align-self: flex-start; background-color: #2d2d2d; border: 1px solid #444; border-bottom-left-radius: 2px; width: 95%; }

        /* Markdown 樣式 */
        .ai h2, .ai h3, .ai h4 { color: #61afef; margin-top: 0; margin-bottom: 10px; }
        .ai code { background: #3e4451; padding: 2px 5px; border-radius: 4px; font-family: 'Consolas', monospace; color: #e5c07b; }

        /* 底部輸入區與氣泡 */
        #input-area { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; background: #1e1e1e; padding-top: 10px; border-top: 1px solid #333; }
        #chips-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { background: #007acc; color: white; border: none; padding: 8px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .chip:hover { background: #005f9e; }

        .input-box-wrapper { display: flex; gap: 10px; }
        #chat-input { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #2d2d2d; color: white; font-size: 14px; outline: none; }
        #chat-input:focus { border-color: #007acc; }
        #send-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #007acc; color: white; font-weight: bold; cursor: pointer; }
        #send-btn:hover { background: #005f9e; }
    </style>
</head>
<body>
<div id="chat-container">
    <div class="message ai">
        <h3>🤖 FZF 專案架構助手</h3>
        <p>請匯入專案。匯入後，您可以點擊快捷按鈕，或直接輸入問題來探索專案架構與資料流！</p>
    </div>
</div>

<div id="input-area">
    <div id="chips-container">
    </div>
    <div class="input-box-wrapper">
        <input type="text" id="chat-input" placeholder="詢問關於專案的架構、資料流或特定功能...">
        <button id="send-btn" onclick="submitQuery()">發送</button>
    </div>
</div>

<script>
    const inputField = document.getElementById('chat-input');
    inputField.addEventListener('keypress', function(e) { if (e.key === 'Enter') submitQuery(); });

    // 送出問題給 Java
    function submitQuery(text) {
        const query = text || inputField.value.trim();
        if (!query) return;

        appendMessage('user', query);
        inputField.value = '';

        if (window.javaApp) {
            window.javaApp.processUserChat(query);
        }
    }

    function appendMessage(role, content) {
        const container = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + role;
        msgDiv.innerHTML = marked.parse(content);
        container.appendChild(msgDiv);
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }

    // 動態產生快捷氣泡
    function setChips(chipsArray) {
        const container = document.getElementById('chips-container');
        container.innerHTML = '';
        chipsArray.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'chip';
            btn.innerText = "🔍 " + text;
            btn.onclick = () => submitQuery(text);
            container.appendChild(btn);
        });
    }

    function clearChat() {
        document.getElementById('chat-container').innerHTML = '';
        appendMessage('ai', '對話已清除。');
    }
</script>
</body>
</html>
