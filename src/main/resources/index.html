<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #1e1e1e; overflow: hidden; }
        #cy { position: absolute; width: 100%; height: 100%; z-index:1}
        #tooltip {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            background: rgba(30, 30, 30, 0.9); border: 1px solid #444;
            color: #d4d4d4; padding: 8px; border-radius: 4px;
            pointer-events: none; display: none; font-family: sans-serif; font-size: 12px;
        }
        #debug-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: #8b0000; color: white; padding: 5px 10px; font-family: monospace; font-size: 12px; z-index: 100; }
    </style>
</head>
<body>
<div id="tooltip"></div>
<div id="cy"></div>
<div id="debug-bar">系統就緒。等待操作...</div>

<script>
    var cy;
    let lastZoomLog = 0;
    const debugBar = document.getElementById('debug-bar');

    function showDebug(msg, isError = false) {
        debugBar.innerText = "狀態: " + msg;
        debugBar.style.backgroundColor = isError ? "#8b0000" : "#007acc";
    }

    // 🚨 升級為 fcose 複合節點排版配置
    const layoutConfig = {
        name: 'fcose',
        quality: 'default',
        randomize: false,        // 保持相對位置穩定
        animate: true,           // 開啟流暢動畫
        animationDuration: 800,
        fit: true,               // 自動縮放符合畫面
        nodeDimensionsIncludeLabels: true, // 🚨 核心關鍵：排版時把文字長度算進去，絕對不重疊！
        packComponents: true     // 把沒有連線的零散方法，自動打包成緊湊的方塊
    };

    function renderGraph(graphData) {
        if(cy) {
            cy.destroy(); // 清除舊圖表確保乾淨
        }

        cy = cytoscape({
            container: document.getElementById('cy'),
            elements: graphData,
            textureOnViewport: false,
            pixelRatio: 1.0,
            hideEdgesOnViewport: false,
            minZoom: 0.2,
            maxZoom: 1.5,

            style: [
                // 1. 類別節點 (父節點容器) 的樣式優化
                {
                    selector: 'node[type="class"]',
                    style: {
                        'background-color': '#007acc',
                        'background-opacity': 0.15, // 🚨 讓實心色塊變成 15% 半透明的玻璃感
                        'border-width': 2,          // 加上科技感邊框
                        'border-color': '#007acc',
                        'label': 'data(label)',
                        'color': '#fff',
                        'text-valign': 'top',
                        'text-margin-y': -8,        // 將標題稍微往上推，不擠壓內容
                        'font-size': '16px',
                        'font-weight': 'bold',
                        'padding': '20px',          // 增加內邊距，讓容器有呼吸空間
                        'shape': 'round-rectangle'
                    }
                },
                // 2. 方法節點 (子節點) 的樣式優化
                {
                    selector: 'node[type="method"]',
                    style: {
                        'display': 'none',
                        'background-color': '#444',
                        'label': 'data(label)',
                        'color': '#eee',
                        'text-valign': 'center',
                        'font-size': '12px',
                        // 🚨 核心關鍵：取消固定寬高，改為 'label' 讓節點自動貼合文字長度
                        'width': 'label',
                        'height': 'label',
                        'padding': '10px',          // 讓文字不會緊貼邊界
                        'shape': 'round-rectangle' // 將圓形改為圓角矩形，更適合放文字
                    }
                },
                // 3. 資料流顏色標記：輸入 (綠色)
                {
                    selector: 'node[flow="input"]',
                    style: {
                        'background-color': '#28a745',
                        'border-width': 2,
                        'border-color': '#fff'
                    }
                },
                // 4. 資料流顏色標記：輸出 (紅色)
                {
                    selector: 'node[flow="output"]',
                    style: {
                        'background-color': '#dc3545',
                        'border-width': 2,
                        'border-color': '#fff'
                    }
                },
                // 邊緣樣式 (如果有跨類別的連線)
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': '#666',
                        'target-arrow-shape': 'triangle',
                        'target-arrow-color': '#666',
                        'curve-style': 'bezier'
                    }
                }
            ],
            layout: layoutConfig
        });

        // 🚨 節點點擊事件：處理「展開/收合」與呼叫 Java
        cy.on('tap', 'node', function(evt){
            var node = evt.target;
            const file = node.data('fileName');
            const type = node.data('type');

            showDebug("點擊節點: " + node.id() + " | 檔案: " + file);

            // 如果點擊的是 Class，就觸發展開/收合動畫
            if (type === 'class') {
                var children = node.children();
                if (children.length > 0) {
                    var isHidden = children[0].style('display') === 'none';
                    // 切換顯示狀態
                    children.style('display', isHidden ? 'element' : 'none');
                    // 重新執行排版動畫
                    cy.layout(layoutConfig).run();
                }
            }

            // 呼叫 Java 端讀取程式碼給 AI
            if (window.javaApp) window.javaApp.showCode(file);
        });

        // 滑鼠懸浮 Tooltip
        cy.on('mouseover', 'node', function(evt){
            var node = evt.target;
            var tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = "類型: " + node.data('type') + "<br>名稱: " + node.data('label');
            tooltip.style.display = 'block';
        });

        cy.on('mouseout', 'node', function(evt){
            document.getElementById('tooltip').style.display = 'none';
        });

        cy.on('zoom', function(){
            const now = Date.now();
            if (now - lastZoomLog > 100) {
                if (window.javaApp) window.javaApp.logZoom(cy.zoom());
                lastZoomLog = now;
            }
        });
    }
</script>
</body>
</html>
