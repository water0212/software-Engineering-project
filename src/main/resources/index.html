<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #1e1e1e; overflow: hidden; }
        #cy { position: absolute; width: 100%; height: 100%; z-index:1}
        #tooltip {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            background: rgba(30, 30, 30, 0.9); border: 1px solid #444;
            color: #d4d4d4; padding: 8px; border-radius: 4px;
            pointer-events: none; display: none; font-family: sans-serif; font-size: 12px;
        }
        #debug-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: #8b0000; color: white; padding: 5px 10px; font-family: monospace; font-size: 12px; z-index: 100; }
    </style>
</head>
<body>
<div id="tooltip"></div>
<div id="cy"></div>
<div id="debug-bar">系統就緒。等待操作...</div>

<script>
    var cy;
    let lastZoomLog = 0;
    const debugBar = document.getElementById('debug-bar');

    function showDebug(msg, isError = false) {
        debugBar.innerText = "狀態: " + msg;
        debugBar.style.backgroundColor = isError ? "#8b0000" : "#007acc";
    }

    const layoutConfig = {
        name: 'fcose',
        quality: 'default',
        randomize: false,
        animate: true,
        animationDuration: 800,
        fit: true,
        packComponents: true
    };

    function renderGraph(graphData) {
        if(cy) {
            cy.destroy(); // 清除舊圖表確保乾淨
        }

        cy = cytoscape({
            container: document.getElementById('cy'),
            elements: graphData,
            textureOnViewport: false,
            pixelRatio: 1.0,
            hideEdgesOnViewport: false,
            minZoom: 0.2,
            maxZoom: 1.5,

            style: [
                {
                    selector: 'node[type="file"]',
                    style: {
                        'background-color': '#8a2be2',
                        'background-opacity': 0.15,
                        'border-width': 2,
                        'border-color': '#8a2be2',
                        'label': 'data(label)',
                        'color': '#fff',
                        'text-valign': 'top',
                        'text-margin-y': -8,
                        'font-size': '18px',
                        'font-weight': 'bold',
                        'padding': '25px',
                        'shape': 'round-rectangle'
                    }
                },
                {
                    selector: 'node[type="class"]',
                    style: {
                        'display': 'none', // 預設隱藏，等點擊檔案才顯示
                        'background-color': '#007acc',
                        'background-opacity': 0.15,
                        'border-width': 2,
                        'border-color': '#007acc',
                        'label': 'data(label)',
                        'color': '#fff',
                        'text-valign': 'top',
                        'text-margin-y': -8,
                        'font-size': '16px',
                        'font-weight': 'bold',
                        'padding': '20px',
                        'shape': 'round-rectangle'
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': '#666',
                        'target-arrow-shape': 'triangle',
                        'target-arrow-color': '#666',
                        'curve-style': 'bezier'
                    }
                }
            ],
            layout: { name: 'preset' }
        });

        cy.elements(':visible').layout(layoutConfig).run();

        cy.on('tap', 'node', function(evt){
            var node = evt.target;
            const file = node.data('fileName');
            const type = node.data('type');

            showDebug("點擊節點: " + node.id() + " | 檔案: " + file);

            // Left-click: only expand/collapse (不要發起詢問或解析)
            if (type === 'file' || type === 'class') {
                var children = node.children();
                if (children.length > 0) {
                    var isHidden = children[0].style('display') === 'none';

                    if (isHidden) {
                        children.style('display', 'element');
                    } else {
                        node.descendants().style('display', 'none');
                    }

                    cy.elements(':visible').layout(layoutConfig).run();
                }
            }
        });

        // Right-click (context tap): 問題詢問並解析，但不展開/收合節點
        cy.on('cxttap', 'node', function(evt){
            // 防止瀏覽器預設的右鍵選單
            if (evt && evt.originalEvent && evt.originalEvent.preventDefault) evt.originalEvent.preventDefault();

            var node = evt.target;
            const file = node.data('fileName');
            const type = node.data('type');

            showDebug("右鍵分析: " + node.id() + " | 檔案: " + file);

            const payload = file + "|||" + type + "|||" + node.data('label');
            if (window.javaApp) window.javaApp.showCode(payload);
        });


        cy.on('mouseover', 'node', function(evt){
            var node = evt.target;
            var tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = "類型: " + node.data('type') + "<br>名稱: " + node.data('label');
            tooltip.style.display = 'block';
        });

        cy.on('mouseout', 'node', function(evt){
            document.getElementById('tooltip').style.display = 'none';
        });

        cy.on('zoom', function(){
            const now = Date.now();
            if (now - lastZoomLog > 100) {
                if (window.javaApp) window.javaApp.logZoom(cy.zoom());
                lastZoomLog = now;
            }
        });
    }

    // --- 🚨 替換為全新版本：根據 LLM 判斷進行完全過濾與畫出動態箭頭 ---
    function highlightAndDrawFlow(classNamesArray, flowArray) {
        if (!cy) return;

        // 1. 清除上一次 AI 產生的「動態箭頭」
        cy.remove('edge[dynamic="true"]');

        // 如果傳入空陣列，代表恢復原狀 (顯示所有檔案，隱藏所有類別)
        if (!classNamesArray || classNamesArray.length === 0) {
            cy.elements('node[type="file"]').style({ 'display': 'element' });
            cy.elements('node[type="class"]').style({ 'display': 'none' });
            cy.layout(layoutConfig).run();
            return;
        }

        // 2. 🚨 完全隱藏：把所有節點直接設定為 none (不可見、不佔位)
        cy.elements('node').style({ 'display': 'none' });

        // 3. 找出被 LLM 點名的類別，並將它們與父節點 (檔案框) 顯示出來
        let targets = cy.collection();
        classNamesArray.forEach(name => {
            const targetNode = cy.nodes(`node[type="class"][label="${name}"]`);
            if(targetNode.length > 0) {
                targets = targets.union(targetNode);
                targets = targets.union(targetNode.parent());
            }
        });

        // 點亮目標節點
        targets.style({ 'display': 'element' });

        // 4. 🚨 繪製資料流動態箭頭
        if (flowArray && flowArray.length > 0) {
            flowArray.forEach(flow => {
                const sourceNode = cy.nodes(`node[type="class"][label="${flow.source}"]`);
                const targetNode = cy.nodes(`node[type="class"][label="${flow.target}"]`);

                if (sourceNode.length > 0 && targetNode.length > 0) {
                    cy.add({
                        group: 'edges',
                        data: {
                            id: 'dyn_' + flow.source + '_' + flow.target,
                            source: sourceNode.id(),
                            target: targetNode.id(),
                            label: flow.label,
                            dynamic: "true"
                        }
                    });
                }
            });
        }

        // 5. 針對動態箭頭套用炫酷樣式 (亮黃色，有文字標籤)
        cy.style().selector('edge[dynamic="true"]').style({
            'width': 3,
            'line-color': '#e5c07b',
            'target-arrow-color': '#e5c07b',
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'label': 'data(label)',
            'font-size': '14px',
            'color': '#e5c07b',
            'text-background-opacity': 1,
            'text-background-color': '#1e1e1e', // 讓文字有底色不會被線擋住
            'text-background-padding': '4px'
        }).update();

        // 6. 重新排版剩下的精華節點
        if(targets.length > 0) {
            cy.elements(':visible').layout(layoutConfig).run();
            cy.fit(targets, 50);
        }
    }
</script> </body>
</html>
