<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>

    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #1e1e1e; overflow: hidden; }
        #cy { position: absolute; width: 100%; height: 100%; z-index:1}
        #tooltip {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            background: rgba(30, 30, 30, 0.9); border: 1px solid #444;
            color: #d4d4d4; padding: 8px; border-radius: 4px;
            pointer-events: none; display: none; font-family: sans-serif; font-size: 12px;
        }
        #debug-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: #8b0000; color: white; padding: 5px 10px; font-family: monospace; font-size: 12px; z-index: 100; }
    </style>
</head>
<body>
<div id="tooltip"></div>
<div id="cy"></div>
<div id="debug-bar">系統就緒。等待操作...</div>

<script>
    var cy;
    let lastZoomLog = 0;
    const debugBar = document.getElementById('debug-bar');

    function showDebug(msg, isError = false) {
        debugBar.innerText = "狀態: " + msg;
        debugBar.style.backgroundColor = isError ? "#8b0000" : "#007acc";
    }

    // 🚨 升級為 fcose 複合節點排版配置
    const layoutConfig = {
        name: 'fcose',
        quality: 'default',
        randomize: false,        // 保持相對位置穩定
        animate: true,           // 開啟流暢動畫
        animationDuration: 800,
        fit: true,               // 自動縮放符合畫面
        nodeDimensionsIncludeLabels: true, // 🚨 核心關鍵：排版時把文字長度算進去，絕對不重疊！
        packComponents: true     // 把沒有連線的零散方法，自動打包成緊湊的方塊
    };

    function renderGraph(graphData) {
        if(cy) {
            cy.destroy();
        }

        cy = cytoscape({
            container: document.getElementById('cy'),
            elements: graphData,
            textureOnViewport: false,
            pixelRatio: 1.0,
            style: [
                // 1. 檔案層級 (最外層)
                {
                    selector: 'node[type="file"]',
                    style: {
                        'background-color': '#ffffff',
                        'background-opacity': 0.05,
                        'border-width': 1,
                        'border-color': '#666',
                        'border-style': 'dashed',
                        'label': 'data(label)',
                        'color': '#888',
                        'text-valign': 'top',
                        'font-size': '16px',
                        'padding': '40px',
                        'shape': 'rectangle'
                    }
                },
                // 2. 類別層級 (中間層)
                {
                    selector: 'node[type="class"]',
                    style: {
                        'display': 'none', // 初始隱藏
                        'background-color': '#007acc',
                        'background-opacity': 0.1,
                        'border-width': 2,
                        'border-color': '#007acc',
                        'label': 'data(label)',
                        'color': '#fff',
                        'text-valign': 'top',
                        'font-size': '14px',
                        'font-weight': 'bold',
                        'padding': '25px',
                        'shape': 'round-rectangle'
                    }
                },
                // 3. 方法層級 (最內層)
                {
                    selector: 'node[type="method"]',
                    style: {
                        'display': 'none', // 初始隱藏
                        'background-color': '#3a4a5a',
                        'label': 'data(label)',
                        'color': '#eee',
                        'text-valign': 'center',
                        'font-size': '11px',
                        'width': 'label',
                        'height': 'label',
                        'padding': '8px',
                        'shape': 'round-rectangle'
                    }
                },
                { selector: 'node[flow="input"]', style: { 'background-color': '#28a745' } },
                { selector: 'node[flow="output"]', style: { 'background-color': '#dc3545' } }
            ],
            // 🚨 初始先不要執行 layout，或是用最簡單的預設
            layout: { name: 'null' }
        });

        // 🚨 關鍵修復：給 WebView 一點時間準備標籤資訊，防止 labelWidth 報錯
        setTimeout(() => {
            try {
                cy.layout({
                    name: 'fcose',
                    quality: 'default',
                    randomize: true, // 初始分開節點
                    animate: true,
                    animationDuration: 600,
                    nodeDimensionsIncludeLabels: true, // 現在可以安全使用了
                    padding: 30,
                    packComponents: true
                }).run();
                showDebug("排版引擎載入完成");
            } catch(e) {
                showDebug("排版失敗，切換後援方案", true);
                cy.layout({ name: 'cose' }).run(); // 如果 fcose 真的不行，自動切換到內建的 cose
            }
        }, 50);

        // --- 點擊事件：處理三層展開 ---
        cy.on('tap', 'node', function(evt){
            var node = evt.target;
            var children = node.children();

            if (children.length > 0) {
                var isHidden = children[0].style('display') === 'none';
                children.style('display', isHidden ? 'element' : 'none');

                // 如果是收合，連孫子一起收
                if (!isHidden) {
                    node.descendants().style('display', 'none');
                }

                // 點擊後重新排版，讓容器自動縮放
                cy.layout({
                    name: 'fcose',
                    animate: true,
                    nodeDimensionsIncludeLabels: true,
                    fit: true
                }).run();
            }

            if (window.javaApp) window.javaApp.showCode(node.data('fileName'));
        });
    }
</script>
</body>
</html>
