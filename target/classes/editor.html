<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1e1e1e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #container { width: 100%; height: 100%; }
        #status-bar {
            position: absolute; top: 0; left: 0; width: 100%;
            background-color: #007acc; color: white;
            padding: 4px 10px; font-size: 12px; z-index: 100;
        }
    </style>

    <script src="https://unpkg.com/resize-observer-polyfill@1.5.1/dist/ResizeObserver.global.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
</head>
<body>

<div id="status-bar">⏳ 正在從 CDN 下載編輯器核心組件，請稍候...</div>
<div id="container"></div>

<script>
    var editor = null;
    var statusBar = document.getElementById('status-bar');

    function updateStatus(msg, color) {
        statusBar.innerText = msg;
        statusBar.style.backgroundColor = color || '#007acc';
        statusBar.style.display = 'block';
    }

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});

    require(['vs/editor/editor.main'], function() {
        try {
            editor = monaco.editor.create(document.getElementById('container'), {
                value: "// 系統已就緒，請點擊左側節點以載入程式碼...",
                language: 'java',
                theme: 'vs-dark',
                readOnly: true,
                automaticLayout: true, // 現在有了 Polyfill，這個功能就不會報錯了！
                fontSize: 14,
                minimap: { enabled: true }
            });
            statusBar.style.display = 'none';
        } catch (e) {
            updateStatus("❌ 編輯器初始化失敗: " + e.message, '#cc0000');
        }
    });

    function setCodeFromBase64(base64Code) {
        if (!editor) {
            updateStatus("⏳ 收到程式碼，但編輯器還在準備中，自動重試...", '#d97706');
            setTimeout(function() { setCodeFromBase64(base64Code); }, 500);
            return;
        }

        try {
            var decodedCode = decodeURIComponent(escape(window.atob(base64Code)));
            editor.setValue(decodedCode);
            statusBar.style.display = 'none';
        } catch (e) {
            updateStatus("❌ 程式碼解碼失敗: " + e.message, '#cc0000');
            editor.setValue("// 發生錯誤，無法解析原始碼。");
        }
    }
</script>
</body>
</html>
