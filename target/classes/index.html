<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #1e1e1e; overflow: hidden; }
        #cy { position: absolute; width: 100%; height: 100%; z-index:1}
        #tooltip {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            background: rgba(30, 30, 30, 0.9); border: 1px solid #444;
            color: #d4d4d4; padding: 8px; border-radius: 4px;
            pointer-events: none; display: none; font-family: sans-serif; font-size: 12px;
        }
        #debug-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: #8b0000; color: white; padding: 5px 10px; font-family: monospace; font-size: 12px; z-index: 100; }
    </style>
</head>
<body>
<div id="tooltip"></div>
<div id="cy"></div>
<div id="debug-bar">系統就緒。等待操作...</div>

<script>
    var cy;
    let lastZoomLog = 0;
    const debugBar = document.getElementById('debug-bar');

        function showDebug(msg, isError = false) {
            debugBar.innerText = "狀態: " + msg;
            debugBar.style.backgroundColor = isError ? "#8b0000" : "#007acc";
        }

    function renderGraph(graphData) {
        cy = cytoscape({
            container: document.getElementById('cy'),
            elements: graphData,
            // 🚨 抗消失優化：關閉紋理緩存，強制 JavaFX 逐幀繪製
            textureOnViewport: false,
            pixelRatio: 1.0,
            hideEdgesOnViewport: false,
            minZoom: 0.2,
            maxZoom: 1.0,

            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': '#3a4a5a',
                        'label': 'data(label)',
                        'color': '#fff',
                        'text-valign': 'center',
                        'font-size': '10px',
                        'width': '60px',
                        'height': '25px',
                        'text-wrap': 'ellipsis',
                        'text-max-width': '45px',
                        'shape': 'round-rectangle',
                        'padding': '5px'
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 1,
                        'line-color': '#666',
                        'target-arrow-shape': 'triangle',
                        'target-arrow-color': '#666',
                        'curve-style': 'bezier'
                    }
                }
            ],
            layout: { name: 'cose', animate: true }
        });

        // 節點點擊
        cy.on('tap', 'node', function(evt){
            const file = evt.target.data('fileName');
            showDebug("點擊節點: " + evt.target.id() + " | 檔案: " + file);
            if (window.javaApp) window.javaApp.showCode(file);
        });
        cy.on('mouseover', 'node', function(evt){
        var node = evt.target;
        var tooltip = document.getElementById('tooltip');
        tooltip.innerHTML = "類型: " + node.data('type') + "<br>名稱: " + node.data('label');
        tooltip.style.display = 'block';
        });


        cy.on('mouseout', 'node', function(evt){
        document.getElementById('tooltip').style.display = 'none';
        });


        // 滾動倍數偵測 (100ms 節流)
        cy.on('zoom', function(){
            const now = Date.now();
            if (now - lastZoomLog > 100) {
                if (window.javaApp) window.javaApp.logZoom(cy.zoom());
                lastZoomLog = now;
            }
        });
    }
</script>
</body>
</html>
